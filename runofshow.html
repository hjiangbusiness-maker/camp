<style>
  :root{ --bg:#14161b; --panel:#1c1f26; --ink:#eceef2; --muted:#9aa1ad;
    --line:rgba(255,255,255,.12); --gold:#f0c34e; --gold-ink:#14161b; --bad:#ff6b6b; }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f2f3f5; --panel:#ffffff; --ink:#1a1d23; --muted:#5c6470; --line:rgba(20,22,27,.14); } }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:grid; place-items:center; padding:24px; }
  .card{ width:100%; max-width:360px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:28px 24px; box-shadow:0 12px 40px rgba(0,0,0,.35); }
  .kicker{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 6px; }
  h1{ font-size:19px; margin:0 0 18px; font-weight:650; }
  label{ display:block; font-size:12px; color:var(--muted); margin:0 0 7px; }
  input{ width:100%; font-size:15px; padding:11px 13px; border-radius:10px;
    border:1px solid var(--line); background:transparent; color:var(--ink); }
  input:focus{ outline:none; border-color:var(--gold); }
  button{ width:100%; margin-top:14px; font-size:15px; font-weight:650; padding:11px 13px;
    border:none; border-radius:10px; background:var(--gold); color:var(--gold-ink); cursor:pointer; }
  button:disabled{ opacity:.6; cursor:default; }
  .err{ color:var(--bad); font-size:13px; margin-top:12px; min-height:16px; }
</style>

const ITER = 250000;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const form = document.getElementById('gate');
const pwEl = document.getElementById('pw');
const errEl = document.getElementById('err');
const goEl = document.getElementById('go');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  goEl.disabled = true; goEl.textContent = 'Unlocking…';
  try {
    const raw = b64(PAYLOAD);
    const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwEl.value), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:ITER, hash:'SHA-256' },
      km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const ptBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    const html = new TextDecoder().decode(ptBuf);
    // Load via a Blob URL (explicit UTF-8) inside a full-viewport iframe. This
    // matches how a normal .html file loads, so scripts run and non-ASCII is
    // decoded correctly (document.write double-encodes non-ASCII in <script>).
    const url = URL.createObjectURL(new Blob([html], { type:'text/html;charset=utf-8' }));
    const f = document.createElement('iframe');
    f.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;');
    f.src = url;
    document.title = "Camp August '26 · Run of Show";
    document.body.style.cssText = 'margin:0;padding:0;background:var(--bg);';
    document.body.replaceChildren(f);
  } catch (err) {
    goEl.disabled = false; goEl.textContent = 'Unlock';
    errEl.textContent = 'Wrong password.';
    pwEl.select();
  }
});
